# Test configuration for pig-order integration tests

spring:
  main:
    allow-bean-definition-overriding: true
  cloud:
    config:
      import-check:
        enabled: false
    nacos:
      config:
        enabled: false
      discovery:
        enabled: false
  application:
    name: pig-order-test
server:
  port: 5010
  servlet:
    context-path: /

# Shared node identifier
node-id: 0

# Matching Engine Configuration
matching-engine:
  default-asset: 1
  asset-symbols:
    1: USDC
  enable-state-recovery: true

pig:
  outbox:
    mode: monolithic
