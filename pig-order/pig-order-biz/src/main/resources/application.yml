server:
  port: 5010

spring:
  application:
    name: @artifactId@
  cloud:
    nacos:
      username: @nacos.username@
      password: @nacos.password@
      discovery:
        server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
      config:
        server-addr: ${spring.cloud.nacos.discovery.server-addr}
  config:
    import:
      - nacos:application-@profiles.active@.yml
      - nacos:${spring.application.name}-@profiles.active@.yml

# Shared node identifier (used for sharding and Snowflake worker ID)
node-id: ${NODE_ID:0}

# Matching Engine Configuration
matching-engine:
  # Default asset symbol ID
  default-asset: 1
  # Asset ID to symbol mapping
  asset-symbols:
    1: USDC
  # Enable state recovery from order table on startup
  enable-state-recovery: true
